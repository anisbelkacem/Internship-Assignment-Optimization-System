services:
  db:
    image: mysql:8.0
    container_name: aspd-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: aspd_db
      MYSQL_USER: aspd
      MYSQL_PASSWORD: aspdpassword
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
